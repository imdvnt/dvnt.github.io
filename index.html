<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>dvnt.su</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #2b1a11;
                --fg: #dccaa6;
                --accent: #3b6b6b;
                --muted: #c2b292;
            }

            html,
            body {
                height: 100%;
            }

            body {
                background: var(--bg);
                color: var(--fg);
                font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 2rem;
            }

            .container {
                text-align: left;
                max-width: 480px;
            }

            .dot {
                width: 8px;
                height: 8px;
                background: var(--accent);
                border-radius: 50%;
                display: inline-block;
                margin-bottom: 2.5rem;
                animation: pulse 2s ease-in-out infinite;
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                    transform: scale(1);
                }
                50% {
                    opacity: 0.4;
                    transform: scale(0.8);
                }
            }

            h1 {
                font-size: clamp(2rem, 6vw, 3.5rem);
                font-weight: 700;
                letter-spacing: -0.03em;
                line-height: 1;
                margin-bottom: 1rem;
            }

            h1 span {
                color: var(--accent);
            }

            p {
                color: var(--muted);
                font-size: 0.8rem;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                margin-bottom: 3rem;
            }

            .status {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                border: 1px solid var(--muted);
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--muted);
            }

            .status::before {
                content: "";
                width: 6px;
                height: 6px;
                background: var(--accent);
                border-radius: 50%;
            }

            footer {
                position: fixed;
                bottom: 2rem;
                font-size: 0.7rem;
                color: #dccaa6;
                letter-spacing: 0.1em;
            }

            .button {
                display: inline-block;
                background: var(--accent);
                color: var(--fg);
                border: none;
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                text-decoration: none;
                cursor: pointer;
            }
        </style>
        <script></script>
    </head>
    <body>
        <div style="padding: 2rem"></div>

        <div style="display: flex; align-items: left; gap: 1rem">
            <a class="button" href="/profile">profile</a>
            <div class="container" style="max-width: 480px">
                <div class="dot"></div>
                <h1>dvnt<span>.su</span></h1>
                <p>domain is live</p>
                <div class="status">everything works</div>
            </div>
        </div>

        <footer>dvnt.su</footer>
    </body>
</html>
